<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&amp;family=Space+Grotesk:wght@300;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#b92902",
                        "on-secondary": "#525151",
                        "on-primary": "#3d6500",
                        "primary-dim": "#97ee00",
                        "secondary-dim": "#d6d4d3",
                        "surface-container-highest": "#262626",
                        "outline-variant": "#494847",
                        "inverse-surface": "#fcf8f8",
                        "on-primary-fixed": "#2b4900",
                        "surface-bright": "#2c2c2c",
                        "inverse-on-surface": "#565554",
                        "on-tertiary-container": "#4a5e00",
                        "surface-container-low": "#131313",
                        "surface-dim": "#0e0e0e",
                        "on-secondary-fixed-variant": "#5c5b5b",
                        "on-error": "#450900",
                        "primary-fixed": "#a2fe0f",
                        "inverse-primary": "#416a00",
                        "tertiary-fixed": "#cafd00",
                        "on-secondary-fixed": "#403f3f",
                        "on-primary-container": "#375b00",
                        "background": "#0e0e0e",
                        "on-surface-variant": "#adaaaa",
                        "tertiary-container": "#cafd00",
                        "surface-container-high": "#201f1f",
                        "outline": "#777575",
                        "surface": "#0e0e0e",
                        "error-dim": "#d53d18",
                        "surface-container": "#1a1919",
                        "secondary-container": "#474746",
                        "error": "#ff7351",
                        "on-surface": "#ffffff",
                        "surface-tint": "#d2ff9a",
                        "surface-container-lowest": "#000000",
                        "secondary": "#e5e2e1",
                        "primary": "#d2ff9a",
                        "on-background": "#ffffff",
                        "surface-variant": "#262626",
                        "secondary-fixed": "#e5e2e1",
                        "secondary-fixed-dim": "#d6d4d3",
                        "primary-fixed-dim": "#97ee00",
                        "on-secondary-container": "#d2d0cf",
                        "tertiary": "#f3ffca",
                        "on-tertiary": "#516700",
                        "on-tertiary-fixed": "#3a4a00",
                        "tertiary-dim": "#beee00",
                        "tertiary-fixed-dim": "#beee00",
                        "on-primary-fixed-variant": "#3f6800",
                        "on-tertiary-fixed-variant": "#526900",
                        "primary-container": "#9ffb06",
                        "on-error-container": "#ffd2c8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #0e0e0e;
            font-family: 'Manrope', sans-serif;
        }
        .kinetic-gradient {
            background: linear-gradient(135deg, #d2ff9a 0%, #9ffb06 100%);
        }
        .obsidian-glass {
            background: rgba(26, 25, 25, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .atmospheric-glow {
            background: radial-gradient(circle at 50% 50%, rgba(210, 255, 154, 0.08) 0%, transparent 70%);
        }
        .ghost-border {
            border: 1px solid rgba(73, 72, 71, 0.15);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col relative overflow-hidden">
<!-- Atmospheric Background Element -->
<div class="absolute inset-0 atmospheric-glow pointer-events-none"></div>
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] atmospheric-glow opacity-30 pointer-events-none"></div>
<!-- Header (Shared Component Mapping) -->
<header class="flex justify-between items-center px-8 py-6 w-full max-w-7xl mx-auto z-20">
<div class="text-2xl font-black text-white tracking-tighter font-['Manrope']">
            BLACKONIX AI
        </div>
<div class="hidden md:flex items-center gap-8 text-[#A3FF12] font-['Manrope'] tracking-tight">
<a class="text-neutral-400 hover:text-[#A3FF12] transition-colors" href="#">Home</a>
</div>
</header>
<!-- Main Content: Centered Sign Up Card -->
<main class="flex-grow flex items-center justify-center p-6 z-10">
<div class="w-full max-w-md obsidian-glass rounded-xl p-8 md:p-12 relative shadow-2xl transition-all duration-500 hover:shadow-[0_0_50px_rgba(210,255,154,0.1)]">
<!-- Branding/Identity -->
<div class="mb-10 text-center">
<h1 class="text-3xl font-extrabold tracking-tight text-on-surface">Sign Up</h1>
</div>
<!-- Form Section -->
<form class="space-y-6">
<!-- Email -->
<div class="space-y-2">
<label class="font-['Space_Grotesk'] text-[11px] uppercase tracking-wider text-on-surface-variant font-medium ml-1">Email</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-lg px-4 py-3 text-on-surface placeholder:text-neutral-600 focus:ring-1 focus:ring-primary transition-all duration-300 outline-none" placeholder="architect@blackonix.ai" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="font-['Space_Grotesk'] text-[11px] uppercase tracking-wider text-on-surface-variant font-medium ml-1">Password</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-lg px-4 py-3 text-on-surface placeholder:text-neutral-600 focus:ring-1 focus:ring-primary transition-all duration-300 outline-none" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-2">
<label class="font-['Space_Grotesk'] text-[11px] uppercase tracking-wider text-on-surface-variant font-medium ml-1">Confirm Password</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-lg px-4 py-3 text-on-surface placeholder:text-neutral-600 focus:ring-1 focus:ring-primary transition-all duration-300 outline-none" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full kinetic-gradient text-on-primary font-bold py-4 rounded-lg shadow-lg hover:brightness-110 active:scale-95 transition-all duration-200 mt-4 tracking-tight" type="submit">
                    Create Account
                </button>
</form>
<!-- Legal/Secondary Actions -->
<div class="mt-8 space-y-4 text-center">
<p class="text-[12px] text-on-surface-variant leading-relaxed px-4">
                    By initializing, you agree to the <a class="text-primary hover:underline" href="#">Privacy Protocol</a> and <a class="text-primary hover:underline" href="#">Terms of Service</a>.
                </p>
<div class="pt-4 border-t border-white/5">
<p class="text-sm text-on-surface-variant">
                        Already have an account? 
                        <a class="text-white font-bold hover:text-primary transition-colors ml-1" href="/login">Log In</a>
</p>
</div>
</div>
</div>
</main>
<!-- Footer (Shared Component Mapping) -->
<footer class="flex justify-between items-center px-8 py-4 w-full z-20">
<div class="font-['Space_Grotesk'] uppercase tracking-widest text-[10px] text-neutral-600">
            © 2024 BLACKONIX AI.
        </div>
<div class="flex gap-6 font-['Space_Grotesk'] uppercase tracking-widest text-[10px] text-neutral-600">
<a class="hover:text-white transition-colors" href="#">Privacy</a>
<a class="hover:text-white transition-colors" href="#">Terms</a>
<a class="hover:text-white transition-colors" href="#">Security</a>
</div>
</footer>
<!-- Decoration element for depth -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-4xl h-[1px] kinetic-gradient opacity-20 blur-sm pointer-events-none"></div>
</body></html>
