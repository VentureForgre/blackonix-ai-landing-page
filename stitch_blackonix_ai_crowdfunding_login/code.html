<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | BLACKONIX AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#b92902",
                        "on-secondary": "#525151",
                        "on-primary": "#3d6500",
                        "primary-dim": "#97ee00",
                        "secondary-dim": "#d6d4d3",
                        "surface-container-highest": "#262626",
                        "outline-variant": "#494847",
                        "inverse-surface": "#fcf8f8",
                        "on-primary-fixed": "#2b4900",
                        "surface-bright": "#2c2c2c",
                        "inverse-on-surface": "#565554",
                        "on-tertiary-container": "#4a5e00",
                        "surface-container-low": "#131313",
                        "surface-dim": "#0e0e0e",
                        "on-secondary-fixed-variant": "#5c5b5b",
                        "on-error": "#450900",
                        "primary-fixed": "#a2fe0f",
                        "inverse-primary": "#416a00",
                        "tertiary-fixed": "#cafd00",
                        "on-secondary-fixed": "#403f3f",
                        "on-primary-container": "#375b00",
                        "background": "#0e0e0e",
                        "on-surface-variant": "#adaaaa",
                        "tertiary-container": "#cafd00",
                        "surface-container-high": "#201f1f",
                        "outline": "#777575",
                        "surface": "#0e0e0e",
                        "error-dim": "#d53d18",
                        "surface-container": "#1a1919",
                        "secondary-container": "#474746",
                        "error": "#ff7351",
                        "on-surface": "#ffffff",
                        "surface-tint": "#d2ff9a",
                        "surface-container-lowest": "#000000",
                        "secondary": "#e5e2e1",
                        "primary": "#d2ff9a",
                        "on-background": "#ffffff",
                        "surface-variant": "#262626",
                        "secondary-fixed": "#e5e2e1",
                        "secondary-fixed-dim": "#d6d4d3",
                        "primary-fixed-dim": "#97ee00",
                        "on-secondary-container": "#d2d0cf",
                        "tertiary": "#f3ffca",
                        "on-tertiary": "#516700",
                        "on-tertiary-fixed": "#3a4a00",
                        "tertiary-dim": "#beee00",
                        "tertiary-fixed-dim": "#beee00",
                        "on-primary-fixed-variant": "#3f6800",
                        "on-tertiary-fixed-variant": "#526900",
                        "primary-container": "#9ffb06",
                        "on-error-container": "#ffd2c8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-gradient {
            background: linear-gradient(135deg, #d2ff9a 0%, #9ffb06 100%);
        }
        .atmospheric-glow {
            background: radial-gradient(circle at 50% 50%, rgba(210, 255, 154, 0.05) 0%, rgba(14, 14, 14, 0) 70%);
        }
        .glass-card {
            backdrop-filter: blur(20px);
            background-color: rgba(26, 25, 25, 0.7);
        }
        .ghost-border {
            border: 1px solid rgba(73, 72, 71, 0.15);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface selection:bg-primary selection:text-on-primary">
<main class="relative min-h-screen w-full flex items-center justify-center overflow-hidden">
<div class="absolute inset-0 atmospheric-glow pointer-events-none"></div>
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px] pointer-events-none"></div>
<section class="relative z-10 w-full max-w-md px-6">
<header class="flex flex-col items-center mb-10">
<h1 class="font-headline font-black text-3xl tracking-tighter text-on-surface mb-2">
                    BLACKONIX AI
                </h1>
</header>
<div class="glass-card ghost-border rounded-xl p-8 shadow-2xl relative overflow-hidden">
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-1/2 h-[1px] bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
<form class="space-y-6">
<div class="space-y-2">
<label class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant block ml-1">
                            Email Address
                        </label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-lg py-4 px-4 text-on-surface placeholder:text-neutral-700 focus:ring-1 focus:ring-primary transition-all duration-300" placeholder="name@domain.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant block">
                                Password
                            </label>
<a class="font-label text-[10px] uppercase tracking-widest text-primary hover:text-primary-dim transition-colors" href="#">
                                Forgot Password?
                            </a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-lg py-4 px-4 text-on-surface placeholder:text-neutral-700 focus:ring-1 focus:ring-primary transition-all duration-300" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="kinetic-gradient w-full py-4 rounded-lg font-headline font-bold text-on-primary tracking-tight hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-outline-variant/10 text-center">
<p class="font-body text-sm text-on-surface-variant">
                        Don't have an account? 
                        <a class="text-on-surface font-semibold hover:text-primary transition-colors ml-1" href="/sign">Sign Up</a>
</p>
</div>
</div>
<footer class="mt-12 flex flex-col items-center space-y-4">
<div class="flex space-x-6">
<a class="font-label text-[9px] uppercase tracking-[0.15em] text-neutral-600 hover:text-white transition-colors" href="#">Privacy</a>
<a class="font-label text-[9px] uppercase tracking-[0.15em] text-neutral-600 hover:text-white transition-colors" href="#">Terms</a>
<a class="font-label text-[9px] uppercase tracking-[0.15em] text-neutral-600 hover:text-white transition-colors" href="#">Security</a>
</div>
<p class="font-label text-[8px] uppercase tracking-[0.2em] text-neutral-700">
                    © 2024 BLACKONIX AI.
                </p>
</footer>
</section>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[160px] pointer-events-none"></div>
</main>
</body></html>
